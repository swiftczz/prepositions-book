name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v), e.g. 0.1.0'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.15.0"

      - name: Derive version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.ver.outputs.is_tag == 'true'
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          if [[ -z "$prev_tag" ]]; then
            echo "## 首次发版" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" >> CHANGELOG.md
          else
            echo "## 更新内容（${prev_tag} → ${{ github.ref_name }}）" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" "${prev_tag}..${{ github.ref_name }}" >> CHANGELOG.md
          fi
          echo "=== changelog ==="
          cat CHANGELOG.md

      - name: Build PDF
        run: |
          typst compile main.typ "prepositions-book-v${{ steps.ver.outputs.version }}.pdf"
          ls -lh *.pdf

      - name: Upload PDF to Release
        if: steps.ver.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: "prepositions-book-v*.pdf"
          body_path: CHANGELOG.md
          generate_release_notes: true

      - name: Upload PDF as workflow artifact
        if: steps.ver.outputs.is_tag == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: prepositions-pdf-v${{ steps.ver.outputs.version }}
          path: "prepositions-book-v*.pdf"
